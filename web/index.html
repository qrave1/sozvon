<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sozvon</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1115;
      color: #e6e6e6;
    }
    header {
      padding: 12px 16px;
      background: #1a1d24;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    header input {
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #11131a;
      color: #fff;
    }
    button {
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      background: #2f6feb;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    button:disabled { opacity: .5; cursor: default; }
    button.danger { background: #c0392b; }
    button.off { background: #555; }
    #status { margin-left: auto; font-size: 13px; opacity: .8; }
    #videos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
      padding: 16px;
    }
    .tile {
      position: relative;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 4 / 3;
    }
    .tile video { width: 100%; height: 100%; object-fit: cover; background: #000; }
    .tile .label {
      position: absolute;
      bottom: 6px; left: 8px;
      font-size: 12px;
      background: rgba(0,0,0,.5);
      padding: 2px 8px;
      border-radius: 4px;
    }
    .tile .badge {
      position: absolute;
      top: 6px; right: 8px;
      font-size: 11px;
      background: rgba(0,0,0,.5);
      padding: 2px 8px;
      border-radius: 4px;
    }
    .tile .label .mic-off {
      margin-left: 4px;
      opacity: .9;
    }
    .avatar {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 700;
      color: #fff;
    }
    .controls { padding: 0 16px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
    .device-bar {
      padding: 0 16px 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .device-bar label {
      font-size: 12px;
      opacity: .7;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .device-bar select {
      padding: 5px 8px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #11131a;
      color: #fff;
      font-size: 12px;
      max-width: 180px;
    }
    .device-bar select:disabled { opacity: .4; cursor: default; }
  </style>
</head>
<body x-data="callApp()" x-init="init()">
  <header>
    <input x-model="name" placeholder="Ваше имя" :disabled="connected" />
    <input x-model="room" placeholder="ID комнаты" :disabled="connected" />
    <button x-show="!connected" @click="join()">Войти</button>
    <button class="danger" x-show="connected" @click="leave()">Выйти</button>
    <button :class="micOn ? '' : 'off'" x-text="micOn ? 'Микрофон: вкл' : 'Микрофон: выкл'" @click="toggleMic()"></button>
    <button :class="camOn ? '' : 'off'" x-text="camOn ? 'Камера: вкл' : 'Камера: выкл'" @click="toggleCam()"></button>
    <span id="status" x-text="status"></span>
  </header>

  <div class="device-bar">
    <label>🎤
      <select x-model="audioInputId" @change="changeDevice('audioinput')" :disabled="connected">
        <template x-for="d in devices.audioinput" :key="d.deviceId">
          <option :value="d.deviceId" x-text="d.label || d.deviceId.slice(0,12) + '…'"></option>
        </template>
      </select>
    </label>
    <label>🔊
      <select x-model="audioOutputId" @change="changeDevice('audiooutput')" :disabled="connected">
        <template x-for="d in devices.audiooutput" :key="d.deviceId">
          <option :value="d.deviceId" x-text="d.label || d.deviceId.slice(0,12) + '…'"></option>
        </template>
      </select>
    </label>
    <label>📷
      <select x-model="videoId" @change="changeDevice('videoinput')" :disabled="connected">
        <template x-for="d in devices.videoinput" :key="d.deviceId">
          <option :value="d.deviceId" x-text="d.label || d.deviceId.slice(0,12) + '…'"></option>
        </template>
      </select>
    </label>
  </div>

  <div id="videos">
      <div class="tile" x-show="connected">
      <video id="vid-local" autoplay playsinline muted x-show="camOn"></video>
      <div class="avatar" x-show="!camOn" :style="'background:' + myColor" x-text="initial"></div>
      <div class="label">
        <span x-text="name || 'я'"></span>
        <span class="mic-off" x-show="!micOn" title="микрофон выключен">🔇</span>
      </div>
    </div>

    <template x-for="p in peers" :key="p.id">
      <div class="tile">
        <video :id="'vid-' + p.id" autoplay playsinline x-show="p.camOn"></video>
        <div class="avatar" x-show="!p.camOn" :style="'background:' + p.color" x-text="p.initial"></div>
        <div class="label">
          <span x-text="p.name || p.id.slice(0, 8)"></span>
          <span class="mic-off" x-show="!p.micOn" title="микрофон выключен">🔇</span>
        </div>
        <div class="badge" x-show="p.mode" x-text="p.mode"></div>
      </div>
    </template>
  </div>

  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="/client.js"></script>
</body>
</html>
